{% extends "base.html" %}

{% block title %}Add Favorite Book{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <!-- Card wrapper -->
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white text-center">
                <h4 class="mb-0">Add Book to Favorites</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% load crispy_forms_tags %}

                    <!-- Crispy form -->
                    {{ form | crispy }}

                    <!-- Submit button -->
                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-outline-dark btn-lg">
                            Save to Favorites
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Optional tip -->
        <p class="text-muted text-center mt-3" style="font-size:0.9rem;">
            Only books already in your bookshelf are shown.
        </p>
    </div>
</div>
{% endblock %}
