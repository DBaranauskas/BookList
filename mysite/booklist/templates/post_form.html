{% extends "base.html" %}

{% block title %}Post create/update{% endblock%}

{% block content %}

<div class="content-section">
  <form method="post">
    {% csrf_token %}
    {% load crispy_forms_tags %}
    <legend class="border-bottom mb-4">Post create/update</legend>
    {{ form | crispy }}
    <div class="form-group">
      <button class="btn btn-outline-info" type="submit">Save</button>
    </div>
  </form>
</div>


{% endblock %}
