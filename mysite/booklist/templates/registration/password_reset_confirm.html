{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg rounded-4 p-4">
            <h2 class="mb-3 text-center fw-bold">Set a New Password</h2>
            <p class="text-center text-muted mb-4">Enter your new password and confirm it below.</p>

            <form method="post">
                {% csrf_token %}
                {% load crispy_forms_tags %}
                {{ form | crispy }}
                <button type="submit" class="btn btn-dark w-100 fw-bold mt-3">Change Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
