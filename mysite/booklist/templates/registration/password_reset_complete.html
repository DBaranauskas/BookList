{% extends "base.html" %}

{% block title %}Password Change Completed{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg rounded-4 p-4 text-center">
            <h2 class="mb-3 text-success fw-bold">Password Changed!</h2>
            <p class="text-muted mb-4">
                Your password has been successfully updated. You can now log in with your new credentials.
            </p>
            <a href="{% url 'login' %}" class="btn btn-dark w-100 fw-bold">Login</a>
        </div>
    </div>
</div>
{% endblock %}
