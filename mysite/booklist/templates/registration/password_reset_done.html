{% extends "base.html" %}

{% block title %}Check Your Email{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg rounded-4 p-4 text-center">
            <h2 class="mb-3 text-success fw-bold">Check Your Email</h2>
            <p class="text-muted mb-4">
                If an account exists with the email address you provided, you will receive an email shortly with instructions to reset your password.
            </p>
            <a href="{% url 'login' %}" class="btn btn-dark w-100 fw-bold">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
