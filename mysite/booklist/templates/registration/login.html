{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg rounded-4 p-4">
            <h2 class="mb-4 text-center fw-bold">Welcome Back</h2>
            <p class="text-center text-muted mb-4">Please log in to your account</p>

            <form method="post">
                {% csrf_token %}
                {% load crispy_forms_tags %}
                {{ form | crispy }}
                <button type="submit" class="btn btn-dark w-100 fw-bold mb-3">Login</button>
                <input type="hidden" name="next" value="{{ next }}"/>
            </form>

            <p class="text-center mb-0">
                <a href="{% url 'password_reset' %}" class="text-decoration-none text-dark fw-semibold">
                    Forgot your password?
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
